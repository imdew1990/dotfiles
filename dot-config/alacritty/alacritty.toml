[general]
live_config_reload = true
import = ["themes/tokyonight_storm.toml"]

[font]
size = 24

[font.normal]
family = "JetBrainsMono Nerd Font"

[window]
padding = { x = 0, y = 0 }
decorations = "Full"
resize_increments = true
dynamic_padding = true
blur = false
startup_mode = "maximized"
dynamic_title = true

[mouse]
hide_when_typing = true
